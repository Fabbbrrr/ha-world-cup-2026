views:
  - type: sections
    sections:
      - type: grid
        cards:
          - type: heading
            heading_style: title
          - type: markdown
            content: |
              <h2>🏆 Group A</h2> <table>
                <tr>
                  <th>Pos</th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th><th>Form</th>
                </tr>
                {% set s = state_attr('sensor.world_cup_standings', 'standings') or [] %}
                {% for g in s if g.group in ['Group A', 'GROUP_A'] %}
                {% for t in g.table %}
                <tr>
                  <td>{{ t.position }}</td>
                  <td>{{ t.team if t.team is string else t.team.shortName }}</td>
                  <td>{{ t.playedGames }}</td>
                  <td>{{ t.won }}</td>
                  <td>{{ t.draw }}</td>
                  <td>{{ t.lost }}</td>
                  <td>{{ t.goalDifference }}</td>
                  <td><b>{{ t.points }}</b></td>
                  <td>{% set fc = {'W':'#00cc55','D':'#f0a500','L':'#e03030'} %}{% for r in (t.form or '').split(',') if r in ['W','D','L'] %}<span style="background:{{ fc[r] }};color:#000;padding:1px 4px;border-radius:3px;font-size:10px;font-weight:800;margin:1px;">{{ r }}</span>{% endfor %}</td>
                </tr>
                {% endfor %}
                {% endfor %}
              </table>
            card_mod:
              style: |
                ha-card {
                  background: rgba(5,14,24,0.45) !important;
                  border-radius: 22px;
                  border: 2px solid rgba(0,255,255,0.45);
                  box-shadow: 0 0 20px rgba(0,255,255,0.30);
                  color: white;
                  padding: 12px;
                }
                table {
                  width: 100%;
                  border-collapse: collapse;
                  font-size: 13px;
                }
                th {
                  color: #00ffff;
                  text-align: left;
                  padding: 4px;
                  border-bottom: 1px solid rgba(0,255,255,0.35);
                }
                td {
                  padding: 4px;
                  border-bottom: 1px solid rgba(255,255,255,0.12);
                }
