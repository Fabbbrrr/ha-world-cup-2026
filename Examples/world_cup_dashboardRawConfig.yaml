    header:
      card:
        type: markdown
        text_only: true
        content: |-

          # 🏆 FIFA WORLD CUP 2026
          Group Stage

          **USA • Canada • Mexico 2026**
    badges: []
    background:
      opacity: 40
      alignment: center
      size: cover
      repeat: repeat
      attachment: fixed
      image:
        media_content_id: media-source://image_upload/247f9d0450fd44ee007e8fa2ea47416e
        media_content_type: image/jpeg
        metadata:
          title: >-
            AAW_J6e_suZHwmP_tKcGkkeYw3aoA_69wdkMM-zFgBLcIbjgmsGD2GSw1tFgw-DTMtbEtpoSzAdmtBcAvs19x1tl800UjhiK0sCWDT4hjrn-_lqStwtuGB2kntvigH7hvt5Ix2WygkcYqb5v8Jjhaqwh6pD0d5OuoYZ44ktWbpJZvlUODAq0EqBz96Dc1sAg.jpg
          thumbnail: /api/image/serve/247f9d0450fd44ee007e8fa2ea47416e/256x256
          media_class: image
          navigateIds:
            - {}
            - media_content_type: app
              media_content_id: media-source://image_upload
    cards: []
    max_columns: 4
    title: 🏆 FIFA WORLD CUP 2026 Group Stage
    icon: ''
    show_icon_and_title: true
  - type: sections
    max_columns: 4
    title: 📅 FIXTURES & RESULTS
    path: games
    sections:
      - type: grid
        cards:
          - type: heading
            heading_style: title
          - type: markdown
            content: >
              <h2>📅 Upcoming Fixtures</h2>


              {% set matches = state_attr('sensor.world_cup_fixtures',
              'matches') or [] %}


              <table>
                <tr>
                  <th>Date</th>
                  <th>KO</th>
                  <th>Match</th>
                  <th>Group</th>
                  <th>Status</th>
                </tr>

                {% for m in matches[:10] %}
                <tr>
                  <td>{{ as_timestamp(m.utcDate) | timestamp_custom('%d %b', true) }}</td>
                  <td>{{ as_timestamp(m.utcDate) | timestamp_custom('%H:%M', true) }}</td>
                  <td>{{ m.home }} v {{ m.away }}</td>
                  <td>{{ m.group | replace('GROUP_', 'Group ') if m.group else '-' }}</td>
                  <td>{{ m.status }}</td>
                </tr>
                {% endfor %}
              </table>
            card_mod:
              style: |
                ha-card {
                  background: rgba(5,14,24,0.45) !important;
                  border-radius: 22px;
                  border: 2px solid rgba(0,255,255,0.45);
                  box-shadow: 0 0 20px rgba(0,255,255,0.30);
                  color: white;
                  padding: 14px;
                }

                h2 {
                  margin-top: 0;
                  color: #00ffff;
                }

                table {
                  width: 100%;
                  border-collapse: collapse;
                  font-size: 13px;
                }

                th {
                  color: #00ffff;
                  text-align: left;
                  padding: 5px;
                  border-bottom: 1px solid rgba(0,255,255,0.35);
                }

                td {
                  padding: 5px;
                  border-bottom: 1px solid rgba(255,255,255,0.12);
                }
      - type: grid
        cards:
          - type: heading
            heading_style: title
      - type: grid
        cards:
          - type: heading
            heading_style: title
          - type: markdown
            content: >
              ## ⚽ Latest Results


              {% set matches = state_attr('sensor.world_cup_fixtures',
              'matches') or [] %}

              {% set results = matches | selectattr('status', 'eq', 'FINISHED')
              | list %}


              {% if results | count == 0 %}
                No matches completed yet.
              {% else %}


              <table>
                <tr>
                  <th>Match</th>
                  <th>Score</th>
                </tr>

                {% for m in results[-10:] | reverse %}
                <tr>
                  <td>{{ m.home }} v {{ m.away }}</td>
                  <td>{{ m.homeScore }} - {{ m.awayScore }}</td>
                </tr>
                {% endfor %}

              </table>


              {% endif %}
            card_mod:
              style: |
                ha-card {
